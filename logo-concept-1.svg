<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="c1GlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#00FF88" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c1GlowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00F0FF" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c1GlowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FFE500" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c1ClearGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FFE500" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="c1Bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#141432"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </radialGradient>
    <linearGradient id="c1ClearLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE500" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FFE500" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#FFE500" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFE500" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#c1Bg)"/>

  <!-- 미세 그리드 -->
  <g opacity="0.04" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- 체크박스 프레임 (중앙 배치) -->
  <rect x="56" y="56" width="400" height="400" rx="28" fill="none" stroke="#00F0FF" stroke-width="5" filter="url(#c1GlowCyan)" opacity="0.7"/>

  <!-- 체크마크 왼쪽 하강 (3셀) - 그린 -->
  <g filter="url(#c1GlowGreen)">
    <rect x="108" y="196" width="44" height="44" rx="4" fill="#00FF88"/>
    <rect x="108" y="196" width="18" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="156" y="244" width="44" height="44" rx="4" fill="#00FF88"/>
    <rect x="156" y="244" width="18" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="204" y="292" width="44" height="44" rx="4" fill="#00FF88"/>
    <rect x="204" y="292" width="18" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- 체크마크 오른쪽 상승 (3셀) - 시안 -->
  <g filter="url(#c1GlowCyan)">
    <rect x="252" y="244" width="44" height="44" rx="4" fill="#00F0FF"/>
    <rect x="252" y="244" width="18" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="300" y="196" width="44" height="44" rx="4" fill="#00F0FF"/>
    <rect x="300" y="196" width="18" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="348" y="148" width="44" height="44" rx="4" fill="#00F0FF"/>
    <rect x="348" y="148" width="18" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- 줄 클리어 블록 줄 -->
  <g filter="url(#c1ClearGlow)">
    <rect x="60" y="380" width="42" height="42" rx="4" fill="#FF3355"/>
    <rect x="106" y="380" width="42" height="42" rx="4" fill="#00FF88"/>
    <rect x="152" y="380" width="42" height="42" rx="4" fill="#FFE500"/>
    <rect x="198" y="380" width="42" height="42" rx="4" fill="#00F0FF"/>
    <rect x="244" y="380" width="42" height="42" rx="4" fill="#FF00E5"/>
    <rect x="290" y="380" width="42" height="42" rx="4" fill="#00FF88"/>
    <rect x="336" y="380" width="42" height="42" rx="4" fill="#FF3355"/>
    <rect x="382" y="380" width="42" height="42" rx="4" fill="#FFE500"/>
  </g>

  <!-- 줄 클리어 빛줄기 -->
  <rect x="40" y="396" width="432" height="3" rx="1.5" fill="url(#c1ClearLine)" opacity="0.55"/>

  <!-- 별 2개 -->
  <g filter="url(#c1GlowYellow)">
    <polygon points="100,140 103,148 111,148 105,153 107,161 100,156 93,161 95,153 89,148 97,148" fill="#FFE500" opacity="0.6"/>
    <polygon points="370,220 373,227 380,227 375,231 376,238 370,234 364,238 365,231 360,227 367,227" fill="#FFE500" opacity="0.5"/>
  </g>

  <!-- 반짝이 점 3개 -->
  <g opacity="0.3">
    <circle cx="150" cy="120" r="1.5" fill="#00FF88"/>
    <circle cx="340" cy="110" r="1.5" fill="#FFE500"/>
    <circle cx="290" cy="320" r="1.5" fill="#00F0FF"/>
  </g>
</svg>
