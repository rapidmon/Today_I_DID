<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 네온 글로우 필터 (번짐 완화) -->
    <filter id="c3GlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#00FF88" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c3GlowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00F0FF" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c3GlowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FFE500" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 체크마크 주변 은은한 원형 글로우 -->
    <filter id="c3CenterGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feFlood flood-color="#00F0FF" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
      </feMerge>
    </filter>
    <!-- 줄 클리어 글로우 (약하게) -->
    <filter id="c3ClearGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FFE500" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="c3Bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#141432"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </radialGradient>
    <linearGradient id="c3ClearLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE500" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FFE500" stop-opacity="0.65"/>
      <stop offset="80%" stop-color="#FFE500" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFE500" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#c3Bg)"/>

  <!-- 미세 그리드 -->
  <g opacity="0.04" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- 3번: 체크리스트 3개 + 은은한 원형 글로우 -->
  <!-- 별 2개, 빛줄기 1줄, 반짝이 점 4개, 파티클 없음, 체크리스트 3개 -->

  <!-- 상단 체크리스트 (3개로 줄임 - 여유있는 간격) -->
  <g opacity="0.6">
    <rect x="88" y="30" width="15" height="15" rx="2" fill="none" stroke="#00FF88" stroke-width="1.8"/>
    <polyline points="91,37 94,42 101,33" fill="none" stroke="#00FF88" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="108" y="35" width="58" height="4" rx="2" fill="#00FF88" opacity="0.4"/>

    <rect x="202" y="30" width="15" height="15" rx="2" fill="none" stroke="#00F0FF" stroke-width="1.8"/>
    <polyline points="205,37 208,42 215,33" fill="none" stroke="#00F0FF" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="222" y="35" width="50" height="4" rx="2" fill="#00F0FF" opacity="0.4"/>

    <rect x="318" y="30" width="15" height="15" rx="2" fill="none" stroke="#FFE500" stroke-width="1.8"/>
    <polyline points="321,37 324,42 331,33" fill="none" stroke="#FFE500" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="338" y="35" width="55" height="4" rx="2" fill="#FFE500" opacity="0.4"/>
  </g>

  <!-- 큰 체크박스 프레임 -->
  <rect x="96" y="60" width="320" height="300" rx="24" fill="none" stroke="#00F0FF" stroke-width="5" filter="url(#c3GlowCyan)" opacity="0.7"/>

  <!-- 체크마크 주변 은은한 원형 글로우 (별 대신 분위기 조성) -->
  <circle cx="270" cy="220" r="90" filter="url(#c3CenterGlow)" fill="#00F0FF"/>

  <!-- 체크마크 왼쪽 하강 (3셀) - 그린 -->
  <g filter="url(#c3GlowGreen)">
    <rect x="148" y="166" width="40" height="40" rx="4" fill="#00FF88"/>
    <rect x="148" y="166" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="192" y="210" width="40" height="40" rx="4" fill="#00FF88"/>
    <rect x="192" y="210" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="236" y="254" width="40" height="40" rx="4" fill="#00FF88"/>
    <rect x="236" y="254" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- 체크마크 오른쪽 상승 (3셀) - 시안 -->
  <g filter="url(#c3GlowCyan)">
    <rect x="280" y="210" width="40" height="40" rx="4" fill="#00F0FF"/>
    <rect x="280" y="210" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="324" y="166" width="40" height="40" rx="4" fill="#00F0FF"/>
    <rect x="324" y="166" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="368" y="122" width="40" height="40" rx="4" fill="#00F0FF"/>
    <rect x="368" y="122" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- 줄 클리어 블록 줄 -->
  <g filter="url(#c3ClearGlow)">
    <rect x="100" y="308" width="38" height="38" rx="4" fill="#FF3355"/>
    <rect x="142" y="308" width="38" height="38" rx="4" fill="#00FF88"/>
    <rect x="184" y="308" width="38" height="38" rx="4" fill="#FFE500"/>
    <rect x="226" y="308" width="38" height="38" rx="4" fill="#00F0FF"/>
    <rect x="268" y="308" width="38" height="38" rx="4" fill="#FF00E5"/>
    <rect x="310" y="308" width="38" height="38" rx="4" fill="#00FF88"/>
    <rect x="352" y="308" width="38" height="38" rx="4" fill="#FF3355"/>
    <rect x="394" y="308" width="20" height="38" rx="4" fill="#FFE500"/>
  </g>

  <!-- 줄 클리어 빛줄기 1줄 -->
  <rect x="60" y="322" width="392" height="3" rx="1.5" fill="url(#c3ClearLine)" opacity="0.5"/>

  <!-- 별 2개 -->
  <g filter="url(#c3GlowYellow)">
    <polygon points="138,110 141,118 149,118 143,123 145,131 138,126 131,131 133,123 127,118 135,118" fill="#FFE500" opacity="0.55"/>
    <polygon points="348,100 350,105 355,105 351,108 352,113 348,110 344,113 345,108 341,105 346,105" fill="#FFE500" opacity="0.45"/>
  </g>

  <!-- 반짝이 점 4개 -->
  <g opacity="0.3">
    <circle cx="180" cy="98" r="1.5" fill="#00FF88"/>
    <circle cx="400" cy="160" r="1.5" fill="#00F0FF"/>
    <circle cx="126" cy="140" r="1.5" fill="#FFE500"/>
    <circle cx="310" cy="280" r="1.5" fill="#FF00E5"/>
  </g>

  <!-- 파티클 없음 -->

  <!-- 하단 텍스트 -->
  <text x="256" y="408" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="22" fill="#00F0FF" filter="url(#c3GlowCyan)" letter-spacing="4">
    TODAY I DID
  </text>

  <text x="256" y="445" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="9" fill="#FFE500" opacity="0.65" letter-spacing="5">
    CHECK &amp; STACK
  </text>
</svg>