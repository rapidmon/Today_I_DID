<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 네온 글로우 필터 (번짐 완화) -->
    <filter id="c2GlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#00FF88" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c2GlowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00F0FF" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c2GlowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#FFE500" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="c2GlowMagenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#FF00E5" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 줄 클리어 글로우 (중간) -->
    <filter id="c2ClearGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#FFE500" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="c2Bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#141432"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </radialGradient>
    <linearGradient id="c2ClearLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE500" stop-opacity="0"/>
      <stop offset="18%" stop-color="#FFE500" stop-opacity="0.75"/>
      <stop offset="82%" stop-color="#FFE500" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFE500" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#c2Bg)"/>

  <!-- 미세 그리드 -->
  <g opacity="0.04" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- 2번: 중간 수준 -->
  <!-- 별 3개, 빛줄기 2줄(opacity 낮춤), 반짝이 점 3개, 파티클 2개(작게) -->

  <!-- 상단 체크리스트 (4개 가로 배치) -->
  <g opacity="0.6">
    <rect x="72" y="30" width="15" height="15" rx="2" fill="none" stroke="#00FF88" stroke-width="1.8"/>
    <polyline points="75,37 78,42 85,33" fill="none" stroke="#00FF88" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="92" y="35" width="55" height="4" rx="2" fill="#00FF88" opacity="0.4"/>

    <rect x="168" y="30" width="15" height="15" rx="2" fill="none" stroke="#00F0FF" stroke-width="1.8"/>
    <polyline points="171,37 174,42 181,33" fill="none" stroke="#00F0FF" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="188" y="35" width="42" height="4" rx="2" fill="#00F0FF" opacity="0.4"/>

    <rect x="252" y="30" width="15" height="15" rx="2" fill="none" stroke="#FFE500" stroke-width="1.8"/>
    <polyline points="255,37 258,42 265,33" fill="none" stroke="#FFE500" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="272" y="35" width="60" height="4" rx="2" fill="#FFE500" opacity="0.4"/>

    <rect x="354" y="30" width="15" height="15" rx="2" fill="none" stroke="#FF00E5" stroke-width="1.8"/>
    <polyline points="357,37 360,42 367,33" fill="none" stroke="#FF00E5" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="374" y="35" width="48" height="4" rx="2" fill="#FF00E5" opacity="0.4"/>
  </g>

  <!-- 큰 체크박스 프레임 -->
  <rect x="96" y="60" width="320" height="300" rx="24" fill="none" stroke="#00F0FF" stroke-width="5" filter="url(#c2GlowCyan)" opacity="0.7"/>

  <!-- 체크마크 왼쪽 하강 (3셀) - 그린 -->
  <g filter="url(#c2GlowGreen)">
    <rect x="148" y="166" width="40" height="40" rx="4" fill="#00FF88"/>
    <rect x="148" y="166" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="192" y="210" width="40" height="40" rx="4" fill="#00FF88"/>
    <rect x="192" y="210" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="236" y="254" width="40" height="40" rx="4" fill="#00FF88"/>
    <rect x="236" y="254" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- 체크마크 오른쪽 상승 (3셀) - 시안 -->
  <g filter="url(#c2GlowCyan)">
    <rect x="280" y="210" width="40" height="40" rx="4" fill="#00F0FF"/>
    <rect x="280" y="210" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="324" y="166" width="40" height="40" rx="4" fill="#00F0FF"/>
    <rect x="324" y="166" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="368" y="122" width="40" height="40" rx="4" fill="#00F0FF"/>
    <rect x="368" y="122" width="16" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- 줄 클리어 블록 줄 -->
  <g filter="url(#c2ClearGlow)">
    <rect x="100" y="308" width="38" height="38" rx="4" fill="#FF3355"/>
    <rect x="142" y="308" width="38" height="38" rx="4" fill="#00FF88"/>
    <rect x="184" y="308" width="38" height="38" rx="4" fill="#FFE500"/>
    <rect x="226" y="308" width="38" height="38" rx="4" fill="#00F0FF"/>
    <rect x="268" y="308" width="38" height="38" rx="4" fill="#FF00E5"/>
    <rect x="310" y="308" width="38" height="38" rx="4" fill="#00FF88"/>
    <rect x="352" y="308" width="38" height="38" rx="4" fill="#FF3355"/>
    <rect x="394" y="308" width="20" height="38" rx="4" fill="#FFE500"/>
  </g>

  <!-- 줄 클리어 빛줄기 2줄 (opacity 낮춤) -->
  <rect x="60" y="321" width="392" height="3" rx="1.5" fill="url(#c2ClearLine)" opacity="0.5"/>
  <rect x="80" y="316" width="352" height="2" rx="1" fill="url(#c2ClearLine)" opacity="0.25"/>

  <!-- 별 3개 (중간 크기) -->
  <g filter="url(#c2GlowYellow)">
    <!-- 별 1 (좌상단) -->
    <polygon points="138,110 141,118 149,118 143,123 145,131 138,126 131,131 133,123 127,118 135,118" fill="#FFE500" opacity="0.65"/>
    <!-- 별 2 (우측) -->
    <polygon points="380,185 383,192 390,192 385,196 386,203 380,199 374,203 375,196 370,192 377,192" fill="#FFE500" opacity="0.55"/>
    <!-- 별 3 (체크마크 상단 중앙) -->
    <polygon points="286,155 288,160 293,160 289,163 290,168 286,165 282,168 283,163 279,160 284,160" fill="#FFE500" opacity="0.45"/>
  </g>

  <!-- 반짝이 점 3개 -->
  <g opacity="0.3">
    <circle cx="180" cy="98" r="1.5" fill="#00FF88"/>
    <circle cx="356" cy="85" r="1.5" fill="#FFE500"/>
    <circle cx="126" cy="140" r="1.5" fill="#00F0FF"/>
  </g>

  <!-- 파티클 2개 (작게) -->
  <g filter="url(#c2GlowMagenta)" opacity="0.35">
    <rect x="112" y="292" width="8" height="8" rx="2" fill="#FF00E5"/>
    <rect x="384" y="288" width="9" height="9" rx="2" fill="#FF00E5"/>
  </g>

  <!-- 하단 텍스트 -->
  <text x="256" y="408" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="22" fill="#00F0FF" filter="url(#c2GlowCyan)" letter-spacing="4">
    TODAY I DID
  </text>

  <text x="256" y="445" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="9" fill="#FFE500" opacity="0.65" letter-spacing="5">
    CHECK &amp; STACK
  </text>
</svg>